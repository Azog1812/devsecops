---
name: DevSecOps CI Pipeline

"on":
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─────────────────────────────────────────────
  # JOB 1 : YAML Linting
  # ─────────────────────────────────────────────
  yaml-lint:
    name: "YAML Lint"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install yamllint
        run: pip install yamllint

      - name: Run yamllint on k8s manifests
        run: yamllint k8s/

      - name: Run yamllint on GitHub Actions workflow
        run: yamllint .github/workflows/

  # ─────────────────────────────────────────────
  # JOB 2 : Build Docker image
  # ─────────────────────────────────────────────
  docker-build:
    name: "Docker Build"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Build Docker image
        run: docker build -t flask-api:latest .

      - name: Save Docker image as artifact
        run: docker save flask-api:latest -o flask-api.tar

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: flask-api-image
          path: flask-api.tar

  # ─────────────────────────────────────────────
  # JOB 3 : Trivy - Scan filesystem (dépendances)
  # ─────────────────────────────────────────────
  trivy-fs-scan:
    name: "Trivy FS Scan (Dependencies)"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Run Trivy vulnerability scanner (filesystem)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
          exit-code: '0'
          severity: 'CRITICAL,HIGH,MEDIUM'
          trivyignores: ''

  # ─────────────────────────────────────────────
  # JOB 4 : Trivy - Scan image Docker
  # ─────────────────────────────────────────────
  trivy-image-scan:
    name: "Trivy Image Scan"
    runs-on: ubuntu-latest
    needs: docker-build
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: flask-api-image

      - name: Load Docker image
        run: docker load -i flask-api.tar

      - name: Run Trivy vulnerability scanner (image)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'flask-api:latest'
          format: 'table'
          exit-code: '0'
          severity: 'CRITICAL,HIGH,MEDIUM'

  # ─────────────────────────────────────────────
  # JOB 5 : Conftest - Politique de sécurité Kubernetes
  # ─────────────────────────────────────────────
  conftest-policy:
    name: "Conftest Policy Check"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install Conftest
        run: |
          VER="v0.46.0"
          FILE="conftest_0.46.0_Linux_x86_64.tar.gz"
          BASE="https://github.com/open-policy-agent/conftest/releases/download"
          wget -q "${BASE}/${VER}/${FILE}"
          tar xzf "${FILE}"
          sudo mv conftest /usr/local/bin/
          conftest --version

      - name: Run Conftest on Kubernetes manifests
        run: conftest test k8s/deployment.yaml --policy policy/
        continue-on-error: true
